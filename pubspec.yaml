name: memory_master
description: "تطبيق احترافي لتثبيت المحفوظات في الذاكرة العميقة باستخدام أفضل الوسائل العلمية"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: 2.2.3
  hive_flutter: 1.1.0
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  flutter_localizations:
    sdk: flutter
  intl: any
  percent_indicator: ^4.2.3
  fl_chart: ^0.69.2
  uuid: ^4.5.1
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/sounds/
